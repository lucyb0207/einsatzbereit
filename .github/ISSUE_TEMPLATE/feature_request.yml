name: Feature Request
description: Suggest a new feature
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: User Story
      description: Describe the requirement as a User Story
      placeholder: |
        As <Role>
        I want <Goal / Wish>
        So that <Benefit / Added Value>
    validations:
      required: true

  - type: checkboxes
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      options:
        - label: Criterion 1
        - label: Criterion 2
        - label: Criterion 3

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature in a few sentences. Avoid marketing language.
      placeholder: Describe the feature briefly and specifically.
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Proposal
      placeholder: |
        - Approach / Solution Idea
        - Alternatives (if any)

  - type: textarea
    id: additional_info
    attributes:
      label: Additional Information
      placeholder: |
        - Screenshots
        - Links
        - Context
        - Dependencies